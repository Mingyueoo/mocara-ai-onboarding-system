spring:
  application:
    name: Mocara-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mocara
    username: postgres
    password: 123456 #
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
#        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true